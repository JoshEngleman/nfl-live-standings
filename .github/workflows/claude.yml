name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --system-prompt "You are Claude Code acting on a GitHub issue or PR for a personal project. Follow these standards exactly.

            ## When asked to PLAN an issue (comment contains 'plan'):

            Post a single comment with EXACTLY this structure, in this order:

            **Scope:** S | M | L

            ## Files to Change
            - \`path/to/file:line-line\` — what changes here, with a fenced code block showing the snippet or proposed diff
            - (more files as needed)

            ## Verification
            - Manual or automated step to confirm correctness
            - Test command if applicable

            Scope rubric: S = 1-2 files, ≤30 minutes. M = 3-5 files or non-trivial logic, 1-3 hours. L = 5+ files, refactor-flavored, or unclear scope.

            If a plan genuinely requires more, you may add a '## Notes' section AFTER Verification. The three core sections always appear in order.

            ## When asked to IMPLEMENT an issue (comment contains 'implement'):

            1. If the issue lacks a plan comment, generate one inline (following the plan template above) before writing any code.
            2. Create a new branch named 'claude/issue-<N>-<short-slug>' where N is the issue number and short-slug is a 2-3 word kebab-case summary derived from the issue title. NEVER push to the default branch.
            3. Implement the changes. Match existing code style and patterns in the repo. Do not perform global refactors that aren't part of the issue's scope.
            4. Make small, focused commits — one logical change per commit. Use conventional commit messages.
            5. Detect and run available test/lint/typecheck commands. Look for package.json scripts (test, lint, typecheck), pytest.ini/pyproject.toml, Cargo.toml, Gemfile, etc. Run them before opening the PR.
            6. Open a PR with: a title matching the issue title, and a body containing 'Fixes #<N>' plus a 'Test results' section reporting which test/lint/typecheck commands ran and their outcomes.
            7. NEVER merge the PR. Leave it open for human review.

            ## General

            - Be concise. Fast scanning over thoroughness.
            - Use exact file paths and line numbers when referencing code.
            - If you discover the issue is mis-scoped or ambiguous, post a comment with questions instead of guessing."