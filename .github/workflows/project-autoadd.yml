name: Auto-add to Inbox project

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/JoshEngleman/projects/2
          github-token: ${{ secrets.PROJECT_TOKEN }}
